
buildscript {
    repositories {
        mavenCentral()
        google()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

def packageJson = new groovy.json.JsonSlurper().parse(file("../package.json"))
def nativeAndroidVersion = packageJson.nativeSdkVersions.android

android {
    namespace 'com.foursquare.movement.react'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "4.1.0"
    }
    lint {
        abortOnError false
    }
}

repositories {
    maven {
        // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
        url("$rootDir/../node_modules/react-native/android")
    }
    mavenCentral() {
        // We don't want to fetch react-native from Maven Central as there are
        // older versions over there.
        content {
            excludeGroup "com.facebook.react"
        }
    }
    google()
    maven {
        url 'https://foursquare.jfrog.io/artifactory/libs-release/'
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
    api "com.foursquare:movementsdk:${nativeAndroidVersion}"
    api("com.foursquare:movementsdk-debugging:${nativeAndroidVersion}") {
        exclude group: 'com.android.support'
    }
    implementation 'androidx.core:core:1.12.0'
}
